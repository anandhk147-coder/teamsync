services:
  # ── Backend Web Service ───────────────────────────────────────────────────────
  - type: web
    name: teamsync-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: teamsync-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://teamsync-frontend.onrender.com

  # ── Frontend Static Site ──────────────────────────────────────────────────────
  - type: web
    name: teamsync-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://teamsync-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  - name: teamsync-db
    plan: free
    region: oregon
